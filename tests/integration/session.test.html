<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Breathe Deep . session integration</title>
  <style>
    body { font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; padding: 24px; max-width: 720px; margin: 0 auto; color: #eee; background: #15171f; }
    h1 { font-weight: 500; font-size: 18px; }
    .row { padding: 6px 10px; border-radius: 6px; margin: 2px 0; }
    .pass { background: rgba(80, 200, 120, 0.12); color: #b9f1c8; }
    .fail { background: rgba(220, 90, 90, 0.18); color: #ffd6d6; white-space: pre-wrap; }
    .summary { margin-top: 16px; padding: 12px; border-radius: 8px; background: #1c2030; }
    /* Hide the mounted app DOM. Tests query it but we don't need to look. */
    #test-app-root { position: absolute; left: -9999px; top: -9999px; }
  </style>
</head>
<body>
  <h1>Breathe Deep . session integration</h1>
  <div id="results"></div>
  <div id="summary" class="summary">running…</div>

  <script>
    if (!/[?&]test(=|&|$)/.test(location.search)) {
      const sep = location.search ? '&' : '?';
      history.replaceState(null, '', location.pathname + location.search + sep + 'test=1');
    }
  </script>
  <script src="../lib/assert.js"></script>
  <script src="../lib/fake-clock.js"></script>
  <script src="../lib/fixtures.js"></script>
  <script src="../../vendor/web-haptics.js"></script>
  <script src="../../app.js"></script>

  <script>
  (async () => {
    const t = TestAssert.create({
      out: document.getElementById('results'),
      summary: document.getElementById('summary'),
    });
    t.installErrorTrap('session');

    const T = window.__breatheTest__;
    if (!T) { t.assert('window.__breatheTest__ is exposed', false); t.finish(); return; }

    let root = null;

    await t.block('mount + initial render: orb is idle and unpressed', () => {
      TestFixtures.withTempStorage(() => {
        root = TestFixtures.mountAppDom();
        T.init();
        const orb = document.getElementById('orb');
        t.eq('orb data-state idle',          orb.dataset.state, 'idle');
        t.eq('orb aria-pressed false',       orb.getAttribute('aria-pressed'), 'false');
        t.eq('start hint visible',           document.getElementById('start-hint').classList.contains('start-hint--hidden'), false);
        t.eq('streak rendered from store',   document.getElementById('streak-value').textContent, '0');
        t.assert('technique chips mounted',  document.querySelectorAll('#technique-chips button').length === T.TECHNIQUES.length);
        t.assert('duration chips mounted',   document.querySelectorAll('#duration-chips button').length === T.DURATIONS.length);
      });
    });

    // The integration tests below reuse the mounted DOM to keep them fast.
    // Each block wraps its own withTempStorage if it touches persisted state.

    await t.block('Session.start → running, aria-pressed=true', () => {
      const orb = document.getElementById('orb');
      const hint = document.getElementById('start-hint');
      T.Session.start();
      try {
        t.eq('state is running',         T.Session.state, 'running');
        t.eq('orb data-state running',   orb.dataset.state, 'running');
        t.eq('orb aria-pressed true',    orb.getAttribute('aria-pressed'), 'true');
        t.eq('start hint hidden',        hint.classList.contains('start-hint--hidden'), true);
      } finally { T.Session.end({ record: false }); }
      t.eq('after end, state is idle',   T.Session.state, 'idle');
      t.eq('after end, aria-pressed false', orb.getAttribute('aria-pressed'), 'false');
    });

    await t.block('Session.pause → paused; resume → running', () => {
      const orb = document.getElementById('orb');
      const hint = document.getElementById('start-hint');
      T.Session.start();
      try {
        T.Session.pause();
        t.eq('paused state',         T.Session.state, 'paused');
        t.eq('orb data-state paused', orb.dataset.state, 'paused');
        t.eq('hint says resume',     hint.textContent, 'tap to resume');

        T.Session.resume();
        t.eq('running again',        T.Session.state, 'running');
        t.eq('orb data-state running', orb.dataset.state, 'running');
      } finally { T.Session.end({ record: false }); }
    });

    await t.block('Session.end below threshold does not record', () => {
      TestFixtures.withTempStorage(() => {
        // Snapshot baseline.
        T.Store.refresh();
        const before = T.Store.get().totalSessions;
        T.Session.start();
        // Don't tick at all → elapsedMs ~ 0, well below 30 s.
        T.Session.end({ record: true });
        T.Store.refresh();
        t.eq('totalSessions unchanged for sub-threshold session',
          T.Store.get().totalSessions, before);
      });
    });

    await t.block('Session.end at-or-above threshold records', () => {
      TestFixtures.withTempStorage(() => {
        T.Store.refresh();
        const before = T.Store.get().totalSessions;
        TestClock.install();
        try {
          T.Session.start();
          // Advance 31 s of fake clock so engine.sessionElapsedMs ≥ 30 s.
          TestClock.tick(31_000);
          T.Session.end({ record: true });
        } finally { TestClock.uninstall(); }
        T.Store.refresh();
        t.eq('totalSessions incremented past threshold',
          T.Store.get().totalSessions, before + 1);
      });
    });

    await t.block('changing technique while running ends the session', () => {
      TestFixtures.withTempStorage(() => {
        T.Session.start();
        t.eq('running before chip click', T.Session.state, 'running');
        const chips = document.querySelectorAll('#technique-chips button');
        const otherId = T.TECHNIQUES[1].id;
        const other = Array.from(chips).find((c) => c.dataset.id === otherId);
        other.click();
        t.eq('switching technique stopped session',  T.Session.state, 'idle');
        t.eq('store techniqueId updated', T.Store.get().techniqueId, otherId);
      });
    });

    await t.block('settings sheet open/close + ESC + a11y', async () => {
      const sheet = document.getElementById('settings-sheet');
      const open = document.getElementById('open-settings');
      open.click();
      t.eq('sheet is open (native dialog)', sheet.open, true);
      // The "open" class is applied inside requestAnimationFrame; let one
      // frame settle before asserting.
      await new Promise((r) => requestAnimationFrame(() => r()));
      t.eq('sheet has open class',          sheet.classList.contains('sheet--open'), true);

      // Native <dialog> dispatches a `cancel` event when the user hits ESC.
      // The app intercepts it and routes to closeSheet().
      sheet.dispatchEvent(new Event('cancel', { cancelable: true }));
      t.eq('cancel removes open class',     sheet.classList.contains('sheet--open'), false);
    });

    if (root) TestFixtures.unmountAppDom(root);
    t.finish();
  })();
  </script>
</body>
</html>
