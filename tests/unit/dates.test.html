<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Breathe Deep . dates</title>
  <style>
    body { font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; padding: 24px; max-width: 720px; margin: 0 auto; color: #eee; background: #15171f; }
    h1 { font-weight: 500; font-size: 18px; }
    .row { padding: 6px 10px; border-radius: 6px; margin: 2px 0; }
    .pass { background: rgba(80, 200, 120, 0.12); color: #b9f1c8; }
    .fail { background: rgba(220, 90, 90, 0.18); color: #ffd6d6; white-space: pre-wrap; }
    .summary { margin-top: 16px; padding: 12px; border-radius: 8px; background: #1c2030; }
  </style>
</head>
<body>
  <h1>Breathe Deep . dates</h1>
  <div id="results"></div>
  <div id="summary" class="summary">running…</div>

  <script>
    if (!/[?&]test(=|&|$)/.test(location.search)) {
      const sep = location.search ? '&' : '?';
      history.replaceState(null, '', location.pathname + location.search + sep + 'test=1');
    }
  </script>
  <script src="../lib/assert.js"></script>
  <script src="../../vendor/web-haptics.js"></script>
  <script src="../../app.js"></script>

  <script>
  (async () => {
    const t = TestAssert.create({
      out: document.getElementById('results'),
      summary: document.getElementById('summary'),
    });
    t.installErrorTrap('dates');

    const T = window.__breatheTest__;
    if (!T) {
      t.assert('window.__breatheTest__ is exposed', false, 'app.js did not see ?test in URL');
      t.finish();
      return;
    }

    await t.block('localDateKey', () => {
      t.eq('pads month and day',  T.localDateKey(new Date(2025, 0, 5)),  '2025-01-05');
      t.eq('end-of-year local',   T.localDateKey(new Date(2025, 11, 31, 23, 59)), '2025-12-31');
      t.eq('start-of-year local', T.localDateKey(new Date(2025, 0, 1, 0, 0)), '2025-01-01');
      t.eq('single-digit month',  T.localDateKey(new Date(2025, 8, 9)),  '2025-09-09');
    });

    await t.block('isYesterdayLocal: nominal', () => {
      t.eq('null prev returns false',          T.isYesterdayLocal(null, '2025-05-09'), false);
      t.eq('same day is not yesterday',        T.isYesterdayLocal('2025-05-09', '2025-05-09'), false);
      t.eq('previous day',                     T.isYesterdayLocal('2025-05-08', '2025-05-09'), true);
      t.eq('two days ago is not yesterday',    T.isYesterdayLocal('2025-05-07', '2025-05-09'), false);
      t.eq('future date returns false',        T.isYesterdayLocal('2025-05-10', '2025-05-09'), false);
    });

    await t.block('isYesterdayLocal: month/year/leap boundaries', () => {
      t.eq('month boundary',  T.isYesterdayLocal('2025-04-30', '2025-05-01'), true);
      t.eq('year boundary',   T.isYesterdayLocal('2024-12-31', '2025-01-01'), true);
      t.eq('leap-day boundary',     T.isYesterdayLocal('2024-02-29', '2024-03-01'), true);
      t.eq('non-leap Feb 28 → Mar 1', T.isYesterdayLocal('2025-02-28', '2025-03-01'), true);
      t.eq('non-leap Feb 29 invalid', T.isYesterdayLocal('2025-02-29', '2025-03-01'), false);
    });

    // DST: in Europe/Ljubljana the spring forward happens on the last Sunday of
    // March (e.g. 2025-03-30) and fall back on the last Sunday of October
    // (2025-10-26). The implementation goes through `new Date(y, m-1, d)`,
    // which uses local midnight, so a 23-hour or 25-hour day must still be
    // recognised as exactly one calendar day.
    await t.block('isYesterdayLocal: DST boundary', () => {
      t.eq('spring forward (23 h day)', T.isYesterdayLocal('2025-03-29', '2025-03-30'), true);
      t.eq('fall back (25 h day)',      T.isYesterdayLocal('2025-10-25', '2025-10-26'), true);
      t.eq('spring forward day-after',  T.isYesterdayLocal('2025-03-30', '2025-03-31'), true);
      t.eq('fall back day-after',       T.isYesterdayLocal('2025-10-26', '2025-10-27'), true);
    });

    t.finish();
  })();
  </script>
</body>
</html>
