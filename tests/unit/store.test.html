<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Breathe Deep . store</title>
  <style>
    body { font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; padding: 24px; max-width: 720px; margin: 0 auto; color: #eee; background: #15171f; }
    h1 { font-weight: 500; font-size: 18px; }
    .row { padding: 6px 10px; border-radius: 6px; margin: 2px 0; }
    .pass { background: rgba(80, 200, 120, 0.12); color: #b9f1c8; }
    .fail { background: rgba(220, 90, 90, 0.18); color: #ffd6d6; white-space: pre-wrap; }
    .summary { margin-top: 16px; padding: 12px; border-radius: 8px; background: #1c2030; }
  </style>
</head>
<body>
  <h1>Breathe Deep . store</h1>
  <div id="results"></div>
  <div id="summary" class="summary">running…</div>

  <script>
    if (!/[?&]test(=|&|$)/.test(location.search)) {
      const sep = location.search ? '&' : '?';
      history.replaceState(null, '', location.pathname + location.search + sep + 'test=1');
    }
  </script>
  <script src="../lib/assert.js"></script>
  <script src="../lib/fixtures.js"></script>
  <script src="../../vendor/web-haptics.js"></script>
  <script src="../../app.js"></script>

  <script>
  (async () => {
    const t = TestAssert.create({
      out: document.getElementById('results'),
      summary: document.getElementById('summary'),
    });
    t.installErrorTrap('store');

    const T = window.__breatheTest__;
    if (!T) { t.assert('window.__breatheTest__ is exposed', false); t.finish(); return; }

    // The Store is a module-level singleton wired to the real STORAGE_KEY.
    // We isolate writes through withTempStorage but always restore subscriptions.

    await t.block('Store.set: writes patch and notifies subscribers', () => {
      TestFixtures.withTempStorage(() => {
        const seen = [];
        const off = T.Store.subscribe((s) => seen.push(s.audio));
        try {
          T.Store.set({ audio: true });
          t.eq('audio is true after set', T.Store.get().audio, true);
          t.assert('subscriber was notified',   seen.length >= 1);
          t.eq('subscriber received new value', seen[seen.length - 1], true);

          T.Store.set({ audio: false });
          t.eq('audio toggles back to false', T.Store.get().audio, false);
          t.assert('subscriber notified again', seen.length >= 2);
        } finally { off(); }
      });
    });

    await t.block('Store.refresh: re-reads localStorage', () => {
      TestFixtures.withTempStorage(() => {
        T.Store.set({ techniqueId: 'classic' });
        // Simulate another tab: write directly to localStorage, bypass Store.
        const raw = JSON.parse(localStorage.getItem(T.STORAGE_KEY));
        raw.techniqueId = 'box';
        localStorage.setItem(T.STORAGE_KEY, JSON.stringify(raw));
        t.eq('Store still has stale value before refresh', T.Store.get().techniqueId, 'classic');

        T.Store.refresh();
        t.eq('Store picks up external write after refresh', T.Store.get().techniqueId, 'box');
      });
    });

    await t.block('Store.subscribe: throwing listener does not break others', () => {
      TestFixtures.withTempStorage(() => {
        let goodReceived = 0;
        const offBad = T.Store.subscribe(() => { throw new Error('oops'); });
        const offGood = T.Store.subscribe(() => { goodReceived++; });
        try {
          T.Store.set({ haptics: false });
          T.Store.set({ haptics: true });
          t.assert('good listener still received both notifications', goodReceived >= 2);
        } finally { offBad(); offGood(); }
      });
    });

    await t.block('Store.subscribe: returned unsubscribe removes listener', () => {
      TestFixtures.withTempStorage(() => {
        let calls = 0;
        const off = T.Store.subscribe(() => { calls++; });
        T.Store.set({ audio: true });
        const before = calls;
        off();
        T.Store.set({ audio: false });
        t.eq('no further calls after unsubscribe', calls, before);
      });
    });

    t.finish();
  })();
  </script>
</body>
</html>
