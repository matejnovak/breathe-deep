<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Breathe Deep . reminder</title>
  <style>
    body { font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; padding: 24px; max-width: 720px; margin: 0 auto; color: #eee; background: #15171f; }
    h1 { font-weight: 500; font-size: 18px; }
    .row { padding: 6px 10px; border-radius: 6px; margin: 2px 0; }
    .pass { background: rgba(80, 200, 120, 0.12); color: #b9f1c8; }
    .fail { background: rgba(220, 90, 90, 0.18); color: #ffd6d6; white-space: pre-wrap; }
    .summary { margin-top: 16px; padding: 12px; border-radius: 8px; background: #1c2030; }
  </style>
</head>
<body>
  <h1>Breathe Deep . reminder</h1>
  <div id="results"></div>
  <div id="summary" class="summary">running…</div>

  <script>
    if (!/[?&]test(=|&|$)/.test(location.search)) {
      const sep = location.search ? '&' : '?';
      history.replaceState(null, '', location.pathname + location.search + sep + 'test=1');
    }
  </script>
  <script src="../lib/assert.js"></script>
  <script src="../lib/fixtures.js"></script>
  <script src="../../vendor/web-haptics.js"></script>
  <script src="../../app.js"></script>

  <script>
  (async () => {
    const t = TestAssert.create({
      out: document.getElementById('results'),
      summary: document.getElementById('summary'),
    });
    t.installErrorTrap('reminder');

    const T = window.__breatheTest__;
    if (!T) { t.assert('window.__breatheTest__ is exposed', false); t.finish(); return; }

    // Mock Notification globally so _fireNow doesn't pop a real toast.
    const realNotification = window.Notification;
    let constructed = [];
    function MockNotification(title, opts) {
      constructed.push({ title: title, opts: opts });
    }
    MockNotification.permission = 'granted';
    MockNotification.requestPermission = () => Promise.resolve('granted');

    function installNotifMock() {
      window.Notification = MockNotification;
      MockNotification.permission = 'granted';
      constructed = [];
    }
    function uninstallNotifMock() {
      window.Notification = realNotification;
      T.Reminder.clear();
    }

    await t.block('schedule(null) is a no-op: no armed hour, no timer churn', () => {
      TestFixtures.withTempStorage(() => {
        installNotifMock();
        try {
          T.Reminder.schedule(null);
          t.eq('armedHour stays null', T.Reminder.armedHour, null);
          t.eq('no Notification constructed', constructed.length, 0);
        } finally { uninstallNotifMock(); }
      });
    });

    await t.block('schedule(hour) arms but does not fire synchronously', () => {
      TestFixtures.withTempStorage(() => {
        installNotifMock();
        try {
          T.Reminder.schedule(8);
          t.eq('armedHour is 8', T.Reminder.armedHour, 8);
          t.eq('no synchronous fire', constructed.length, 0);
        } finally { uninstallNotifMock(); }
      });
    });

    await t.block('_fireNow constructs a Notification and stamps REMINDER_KEY', () => {
      TestFixtures.withTempStorage(() => {
        installNotifMock();
        try {
          T.Reminder._fireNow(8);
          t.eq('one Notification fired', constructed.length, 1);
          t.eq('REMINDER_KEY stamped with today',
            localStorage.getItem(T.REMINDER_KEY), T.localDateKey());

          // Same-day refire is suppressed by the REMINDER_KEY stamp.
          T.Reminder._fireNow(8);
          t.eq('refire on same day suppressed', constructed.length, 1);
        } finally { uninstallNotifMock(); }
      });
    });

    await t.block('sync(hour) is a no-op when armedHour matches', () => {
      TestFixtures.withTempStorage(() => {
        installNotifMock();
        try {
          T.Reminder.schedule(9);
          const armedBefore = T.Reminder.armedHour;
          T.Reminder.sync(9);
          t.eq('armedHour unchanged after sync(same)', T.Reminder.armedHour, armedBefore);

          T.Reminder.sync(11);
          t.eq('armedHour updated after sync(different)', T.Reminder.armedHour, 11);

          T.Reminder.sync(null);
          t.eq('sync(null) clears armedHour', T.Reminder.armedHour, null);
        } finally { uninstallNotifMock(); }
      });
    });

    await t.block('nextFireDelay: today if hour is in the future, tomorrow otherwise', () => {
      const noonToday = new Date();
      noonToday.setHours(12, 0, 0, 0);

      const at13 = T.Reminder._nextFireDelay(13, noonToday);
      t.near('13:00 from noon is +1h', at13, 60 * 60 * 1000, 1);

      const at11 = T.Reminder._nextFireDelay(11, noonToday);
      t.near('11:00 from noon is +23h', at11, 23 * 60 * 60 * 1000, 1);

      // Same hour as `now` already started → must roll to tomorrow (same hour).
      const at12 = T.Reminder._nextFireDelay(12, noonToday);
      t.near('12:00 from noon is +24h', at12, 24 * 60 * 60 * 1000, 1);
    });

    await t.block('REMINDER_HOURS list is the contiguous 6..23 range', () => {
      const expected = [];
      for (let h = 6; h <= 23; h++) expected.push(h);
      t.deepEq('REMINDER_HOURS matches expected', T.REMINDER_HOURS, expected);
    });

    t.finish();
  })();
  </script>
</body>
</html>
