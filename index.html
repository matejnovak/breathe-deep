<!doctype html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Breathe Deep</title>
  <meta name="description" content="A small space to breathe. Pick a rhythm, follow the orb, exhale.">
  <meta name="author" content="Matej Novak">

  <!-- Defence-in-depth CSP. The app loads only its own assets plus Google Fonts.
       frame-ancestors / sandbox / HSTS need real HTTP headers (set on the
       origin/Cloudflare). object-src 'none' blocks legacy plugin embeds. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'none'; object-src 'none';">

  <meta name="theme-color" content="#0e1018" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f3ebe2" media="(prefers-color-scheme: light)">
  <meta name="color-scheme" content="dark light">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3CradialGradient id='g' cx='40%25' cy='35%25' r='65%25'%3E%3Cstop offset='0%25' stop-color='%23f3d6c1'/%3E%3Cstop offset='100%25' stop-color='%231f2a44'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='28' fill='url(%23g)'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="img/apple-touch-icon-iphone.png">
  <link rel="apple-touch-icon" sizes="76x76"  href="img/touch-icon-ipad.png">
  <link rel="apple-touch-icon" sizes="120x120" href="img/touch-icon-iphone-retina.png">
  <link rel="apple-touch-icon" sizes="152x152" href="img/touch-icon-ipad-retina.png">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Breathe Deep">

  <link rel="manifest" href="manifest.webmanifest">

  <!-- Optional remote display font; degrades gracefully to system serif when offline.
       Axis ranges are narrowed to what style.css actually requests (opsz 14..144,
       wght 300..480, SOFT 50..100). Tightening the variable axes meaningfully
       shrinks the woff2 payload. Bump CACHE in sw.js when this URL changes. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@14..144,300..480,50..100&display=swap">

  <link rel="stylesheet" href="style.css">
  <meta property="og:title" content="Breathe Deep">
  <meta property="og:description" content="A small space to breathe.">
  <meta property="og:type" content="website">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="top-bar">
    <div id="streak-badge" class="streak" aria-live="polite">
      <svg viewBox="0 0 24 24" aria-hidden="true" class="streak__glyph">
        <path d="M12 3c1.5 4 5 5 5 9a5 5 0 1 1-10 0c0-2 1-3 2-4 0 2 1 3 2 3 0-3-1-5 1-8z" fill="currentColor"/>
      </svg>
      <span id="streak-value">0</span>
    </div>

    <button id="open-settings" class="icon-btn" type="button" aria-label="Open settings" aria-haspopup="dialog">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="6"  cy="12" r="1.6" fill="currentColor"/>
        <circle cx="12" cy="12" r="1.6" fill="currentColor"/>
        <circle cx="18" cy="12" r="1.6" fill="currentColor"/>
      </svg>
    </button>
  </header>

  <main class="stage">
    <div class="aura" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>

    <button id="orb" class="orb" type="button" aria-pressed="false" data-state="idle" aria-label="Begin or pause breathing">
      <svg class="orb__svg" viewBox="0 0 240 240" aria-hidden="true">
        <defs>
          <radialGradient id="orb-grad" cx="42%" cy="36%" r="68%">
            <stop offset="0%"   stop-color="var(--orb-hi)"  stop-opacity="1"/>
            <stop offset="55%"  stop-color="var(--orb-mid)" stop-opacity="0.92"/>
            <stop offset="100%" stop-color="var(--orb-lo)"  stop-opacity="0.95"/>
          </radialGradient>
          <radialGradient id="orb-soft" cx="50%" cy="50%" r="55%">
            <stop offset="0%"   stop-color="var(--orb-hi)" stop-opacity="0.45"/>
            <stop offset="100%" stop-color="var(--orb-hi)" stop-opacity="0"/>
          </radialGradient>
          <filter id="orb-blur"><feGaussianBlur stdDeviation="2.4"/></filter>
        </defs>
        <circle cx="120" cy="120" r="118" fill="url(#orb-soft)" filter="url(#orb-blur)"/>
        <circle id="orb-circle" cx="120" cy="120" r="105" fill="url(#orb-grad)"/>
        <circle cx="92" cy="84" r="22" fill="var(--orb-hi)" opacity="0.18" filter="url(#orb-blur)"/>
      </svg>
      <span class="orb__inner">
        <span id="phase-label" class="phase" aria-live="polite" aria-atomic="true"></span>
      </span>
    </button>

    <p id="session-timer" class="timer" aria-live="off"></p>
    <p id="start-hint" class="start-hint">tap to begin</p>
  </main>

  <footer class="foot">
    <p class="foot__line">space pauses · t cycles · m mutes · s opens settings</p>
  </footer>

  <!-- Settings sheet (native <dialog>: handles backdrop, focus trap, Esc) -->
  <dialog id="settings-sheet" class="sheet" aria-labelledby="sheet-title">
    <div class="sheet__panel" role="document">
      <header class="sheet__head">
        <h2 id="sheet-title" class="sheet__title">Settings</h2>
        <button id="sheet-close" class="icon-btn" type="button" aria-label="Close settings">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </header>

      <section class="sheet__section">
        <h3 class="sheet__label">Practice</h3>
        <div id="technique-chips" class="chips" role="group" aria-label="Breathing technique"></div>
        <p id="technique-description" class="sheet__hint"></p>
      </section>

      <section class="sheet__section">
        <h3 class="sheet__label">Length <span class="sheet__sub">minutes</span></h3>
        <div id="duration-chips" class="chips" role="group" aria-label="Session length"></div>
      </section>

      <section class="sheet__section sheet__section--row">
        <label class="switch">
          <span>Sound</span>
          <input id="toggle-audio" type="checkbox" role="switch">
        </label>
        <label class="switch">
          <span>Haptics</span>
          <input id="toggle-haptics" type="checkbox" role="switch">
        </label>
      </section>

      <section class="sheet__section sheet__section--row">
        <label class="select">
          <span>Theme</span>
          <select id="theme-select">
            <option value="auto">Auto</option>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </label>
        <label class="select">
          <span>Reminder</span>
          <!-- Options populated by mountReminderOptions() in app.js -->
          <select id="reminder-select"></select>
        </label>
      </section>

      <footer class="sheet__foot">
        <p>
          <strong id="total-minutes">0</strong> min ·
          <strong id="total-sessions">0</strong> sessions
        </p>
        <p><a href="privacy-policy.html">Privacy</a> · made by <a href="https://www.matejnovak.si">Matej Novak</a></p>
      </footer>
    </div>
  </dialog>

  <script src="vendor/web-haptics.js?v=2" defer></script>
  <script src="app.js?v=2" defer></script>
</body>
</html>
